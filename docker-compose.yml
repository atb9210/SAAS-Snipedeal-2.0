# docker-compose.yml - SnipeDeal 2.0 PWA
# Stack: Next.js + MySQL + Redis + Worker
# Ottimizzato per Dokploy Production
# Timestamp: 2024-12-09

services:
  # ============================================
  # DATABASE MYSQL
  # ============================================
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-snipedeal_root_2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-snipedeal}
      MYSQL_USER: ${MYSQL_USER:-snipedeal}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-snipedeal_secret_2024}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - snipedeal-network

  # ============================================
  # REDIS (BullMQ Job Queue)
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - snipedeal-network

  # ============================================
  # APP NEXT.JS (Frontend + API)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-snipedeal}:${MYSQL_PASSWORD:-snipedeal_secret_2024}@mysql:3306/${MYSQL_DATABASE:-snipedeal}
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-this-secret-in-dokploy-env}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - snipedeal-network

  # ============================================
  # WORKER (Background Job Scraping)
  # ============================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-snipedeal}:${MYSQL_PASSWORD:-snipedeal_secret_2024}@mysql:3306/${MYSQL_DATABASE:-snipedeal}
      - REDIS_URL=redis://redis:6379
    healthcheck:
      # Verifica che il worker scriva heartbeat su Redis
      test: ["CMD-SHELL", "redis-cli -h redis GET worker:heartbeat | grep -q '[0-9]'"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - snipedeal-network

# ============================================
# VOLUMES PERSISTENTI (NON si perdono con rebuild!)
# ============================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# ============================================
# NETWORK
# ============================================
networks:
  snipedeal-network:
    driver: bridge
