# docker-compose.dokploy.yml
# Stack completo per deployment su Dokploy
# ============================================
# Questo file gestisce:
# - MySQL (database persistente)
# - Redis (job queue)
# - App Next.js (frontend + API)
# - Worker (background scraping)
# ============================================

version: '3.8'

services:
  # ============================================
  # DATABASE MYSQL
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: snipedeal-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-snipedeal_pwa}
      MYSQL_USER: ${MYSQL_USER:-snipedeal}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - snipedeal-network

  # ============================================
  # REDIS (Job Queue per BullMQ)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: snipedeal-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - snipedeal-network

  # ============================================
  # APP NEXT.JS (Frontend + API)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snipedeal-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      - DATABASE_URL=mysql://${MYSQL_USER:-snipedeal}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-snipedeal_pwa}
      
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      
      # NextAuth
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      
      # OAuth (optional)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_ID=${GITHUB_ID:-}
      - GITHUB_SECRET=${GITHUB_SECRET:-}
      
      # App config
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    networks:
      - snipedeal-network

  # ============================================
  # WORKER (Background Job Processor)
  # ============================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: snipedeal-worker
    restart: unless-stopped
    environment:
      # Database
      - DATABASE_URL=mysql://${MYSQL_USER:-snipedeal}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-snipedeal_pwa}
      
      # Redis
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379
      
      # App config
      - NODE_ENV=production
    
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started
    
    networks:
      - snipedeal-network

# ============================================
# VOLUMES PERSISTENTI
# ============================================
volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local

# ============================================
# NETWORK
# ============================================
networks:
  snipedeal-network:
    driver: bridge

